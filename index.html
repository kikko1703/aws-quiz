<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWS Practitioner Simulator Pro</title>
    <style>
        :root { 
            --aws-blue: #161e27; 
            --aws-orange: #ff9900; 
            --aws-dark-bg: #0f141a; 
            --aws-light-text: #ffffff; 
            --card-bg: #1c252e;     
            --success: #2ecc71; 
            --error: #e74c3c; 
        }
        
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: var(--aws-dark-bg); 
            color: var(--aws-light-text); 
            margin: 0; 
            padding: 20px; 
        }

        .container { 
            max-width: 850px; 
            margin: 0 auto; 
            background: var(--card-bg); 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            min-height: 450px; 
            border: 1px solid #333;
        }

        /* CLASSE FONDAMENTALE MANCANTE */
        .hidden { display: none !important; }
        
        .menu h1 { color: var(--aws-orange); }
        
        .btn-menu { 
            display: block; 
            width: 100%; 
            max-width: 350px; 
            margin: 15px auto; 
            padding: 18px; 
            font-size: 1.1em; 
            font-weight: bold; 
            cursor: pointer; 
            border-radius: 8px; 
            border: 2px solid var(--aws-orange); 
            background: transparent; 
            color: var(--aws-orange); 
            transition: 0.3s; 
        }
        
        .btn-menu:hover { 
            background: var(--aws-orange); 
            color: var(--aws-dark-bg); 
        }

        .header { 
            border-bottom: 2px solid var(--aws-orange); 
            padding-bottom: 10px; 
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .option { 
            display: block; 
            padding: 15px; 
            margin: 10px 0; 
            border: 2px solid #3e4b59; 
            border-radius: 8px; 
            cursor: pointer; 
            background: #252f3a;
            transition: 0.2s; 
        }
        
        .option:hover { border-color: var(--aws-orange); }

        .correct-opt { 
            border-color: var(--success) !important; 
            background: rgba(46, 204, 113, 0.2) !important; 
            color: #2ecc71;
        }
        
        .wrong-opt { 
            border-color: var(--error) !important; 
            background: rgba(231, 76, 60, 0.2) !important; 
            color: #e74c3c;
        }

        input[type="number"] {
            background: #0f141a;
            border: 1px solid var(--aws-orange);
            color: white;
            padding: 5px;
            border-radius: 4px;
        }

        .progress-bar { background: #333; height: 10px; border-radius: 5px; margin-bottom: 20px; }
        .progress-fill { background: var(--aws-orange); height: 100%; width: 0%; transition: 0.3s; border-radius: 5px; }
        
        button#action-btn { 
            background: var(--aws-orange); 
            color: var(--aws-dark-bg); 
            border: none; 
            padding: 12px 30px; 
            border-radius: 5px; 
            font-weight: bold; 
            cursor: pointer; 
        }

        #explanation {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            background: #252f3a;
            border-left: 5px solid var(--aws-orange);
        }
        .result-item {
    margin-bottom: 20px;
    padding: 15px;
    border-radius: 8px;
    background: #252f3a;
    border-left: 5px solid #333;
}
.result-item.correct { border-left-color: var(--success); }
.result-item.wrong { border-left-color: var(--error); }

.res-text { font-weight: bold; margin-bottom: 10px; display: block; }
.res-ans { font-size: 0.9em; margin: 5px 0; }
.res-expl { 
    font-size: 0.85em; 
    margin-top: 10px; 
    padding-top: 10px; 
    border-top: 1px solid #444; 
    color: #aaa;
}
    </style>
</head>
<body>

<div class="container" id="main-container">
    <div id="menu-screen" class="menu">
        <h1>AWS Practitioner Simulator</h1>
        <p>Scegli come vuoi studiare:</p>
        <button class="btn-menu" onclick="avviaQuiz('esame')">SIMULAZIONE ESAME<br><small>(65 domande casuali - feedback finale)</small></button>
        <button class="btn-menu" onclick="avviaQuiz('esercizio')">ESERCITAZIONE CASUALE<br><small>(65 domande casuali - feedback immediato)</small></button>
        <button class="btn-menu" onclick="avviaQuiz('sequenziale')">PERCORSO SEQUENZIALE<br><small>(Dalla 1 alla 720 - feedback immediato)</small></button>
        <button id="resume-btn" class="btn-menu hidden" onclick="riprendiSequenziale()">RIPRENDI SEQUENZIALE<br><small id="resume-info"></small></button>
    </div>
      <div class="menu-item" style="margin-top: 15px; border: 1px solid #444; padding: 10px; border-radius: 8px;">
    <p>MODALITÀ BLOCCHI (65 domande):</p>
    <select id="select-blocco" style="width: 100%; padding: 10px; margin-bottom: 10px; background: #252f3a; color: white; border: 1px solid var(--aws-orange);">
        <option value="0">Blocco 1 (Domande 1-65)</option>
        <option value="1">Blocco 2 (Domande 66-130)</option>
        <option value="2">Blocco 3 (Domande 131-195)</option>
        <option value="3">Blocco 4 (Domande 196-260)</option>
        <option value="4">Blocco 5 (Domande 261-325)</option>
        <option value="5">Blocco 6 (Domande 326-390)</option>
        <option value="6">Blocco 7 (Domande 391-455)</option>
        <option value="7">Blocco 8 (Domande 456-520)</option>
        <option value="8">Blocco 9 (Domande 521-585)</option>
        <option value="9">Blocco 10 (Domande 586-650)</option>
        <option value="10">Blocco 11 (Domande 651-715)</option>
        <option value="11">Blocco 12 (Domande 716-720)</option>
    </select>
    <button class="btn-menu" onclick="avviaQuiz('blocco')">AVVIA BLOCCO SELEZIONATO</button>
</div>


    <div id="quiz-screen" class="hidden">
        <div class="header">
            <div style="display: flex; flex-direction: column;">
                <span id="mode-title" style="font-weight: bold;"></span>
                <div id="jump-container" class="hidden" style="margin-top: 5px;">
                    <span style="font-size: 0.8em;">Vai a: </span>
                    <input type="number" id="jump-input" min="1" style="width: 50px; padding: 2px;">
                    <button onclick="saltaADomanda()" style="background: #555; color: white; border: none; cursor: pointer; padding: 2px 10px; border-radius: 3px;">Vai</button>
                </div>
            </div>
            <span id="counter"></span>
        </div>
        <div class="progress-bar"><div id="progress" class="progress-fill"></div></div>
        <div class="question-text" id="question-body" style="margin-bottom: 20px; font-size: 1.1em;"></div>
        <div id="options-container"></div>
        <div id="explanation" class="hidden"></div>
        <div class="footer" style="margin-top: 30px; display: flex; justify-content: space-between; align-items: center;">
            <span id="hint" style="font-size: 0.9em; color: #aaa;"></span>
            <button id="action-btn" onclick="gestisciClick()">Invia Risposta</button>
        </div>
    </div>
    <!-- Schermata dei Risultati Finali -->
        <div id="result-screen" class="hidden">
            <h2 style="color: var(--aws-orange); margin-bottom: 10px;">Riepilogo Esame</h2>
            <div id="score-summary" style="font-size: 1.2em; margin-bottom: 20px; padding: 15px; background: #252f3a; border-radius: 8px; text-align: center;"></div>
            <div id="results-list"></div>
            <button class="btn-menu" style="margin-top: 20px; width: 100%;" onclick="location.reload()">Torna al Menu Principal</button>
        </div>
</div>

<script>
    let database = [];
    let sessione = [];
    let indice = 0;
    let corretteCount = 0;
    let modalita = ''; 
    let feedbackAttivo = false;
    let logRisposte = [];

    // Caricamento dati
    fetch('domande.json')
        .then(res => res.json())
        .then(data => {
            database = data;
            checkSalvataggi();
        })
        .catch(err => console.error("Errore caricamento JSON:", err));

    function checkSalvataggi() {
        const lastIndex = localStorage.getItem('aws_quiz_last_index');
        if (lastIndex !== null) {
            document.getElementById('resume-btn').classList.remove('hidden');
            document.getElementById('resume-info').innerText = `Ultima domanda: ${parseInt(lastIndex) + 1}`;
        }
    }

    function avviaQuiz(tipo) {
    modalita = tipo;
    corretteCount = 0;
    indice = 0;
    logRisposte = [];
    
    let domandeSelezionate = [];

    // GESTIONE DELLE MODALITÀ
    if (tipo === 'blocco') {
        const numBlocco = parseInt(document.getElementById('select-blocco').value);
        const start = numBlocco * 65;
        const end = start + 65;
        // Prendiamo le 65 domande di quel blocco specifico
        domandeSelezionate = database.slice(start, end);
    } else if (tipo === 'esame') {
        // 65 domande casuali da tutto il database
        domandeSelezionate = [...database].sort(() => 0.5 - Math.random()).slice(0, 65);
    } else if (tipo === 'esercizio') {
        // Altre 65 domande casuali (puoi cambiare il numero se vuoi)
        domandeSelezionate = [...database].sort(() => 0.5 - Math.random()).slice(0, 65);
    } else if (tipo === 'sequenziale') {
        // Tutte le domande in ordine dalla 1 alla 720
        domandeSelezionate = [...database];
    }

    // MESCOLAMENTO DELLE RISPOSTE (shuffle)
    // Trasformiamo ogni domanda originale in una domanda con opzioni mescolate
    sessione = domandeSelezionate.map(d => shuffleOptions(d));

    // CAMBIO SCHERMATA
    document.getElementById('menu-screen').classList.add('hidden');
    document.getElementById('quiz-screen').classList.remove('hidden');
    
    // Avvia la prima domanda
    mostraDomanda();
}

    function riprendiSequenziale() {
        modalita = 'sequenziale';
        indice = parseInt(localStorage.getItem('aws_quiz_last_index')) || 0;
        sessione = [...database];
        document.getElementById('menu-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        document.getElementById('jump-container').classList.remove('hidden');
        document.getElementById('mode-title').innerText = "Percorso Sequenziale (Ripreso)";
        mostraDomanda();
    }

    function mostraDomanda() {
        const q = sessione[indice];
        const isMultiple = Array.isArray(q.corretta);
        feedbackAttivo = false;

        // Reset UI
        document.getElementById('explanation').classList.add('hidden');
        document.getElementById('counter').innerText = `Domanda ${indice + 1} di ${sessione.length}`;
        document.getElementById('progress').style.width = `${((indice) / sessione.length) * 100}%`;
        document.getElementById('question-body').innerText = q.testo;
        document.getElementById('hint').innerText = isMultiple ? "Scegli più risposte" : "Scegli una risposta";
        
        const btn = document.getElementById('action-btn');
        btn.innerText = "Invia Risposta";
        btn.style.background = "var(--aws-orange)";

        const container = document.getElementById('options-container');
        container.innerHTML = '';

        q.opzioni.forEach((opt, i) => {
            const label = document.createElement('label');
            label.className = 'option';
            label.id = `opt-${i}`;
            const type = isMultiple ? 'checkbox' : 'radio';
            label.innerHTML = `<input type="${type}" name="ans" value="${i}"> ${opt}`;
            container.appendChild(label);
        });

        if (modalita === 'sequenziale') {
            localStorage.setItem('aws_quiz_last_index', indice);
        }
    }

    function gestisciClick() {
        if (feedbackAttivo) {
            prossima();
        } else {
            valida();
        }
    }

    function valida() {
        const selezionati = Array.from(document.querySelectorAll('input[name="ans"]:checked')).map(el => parseInt(el.value));
        if (selezionati.length === 0) return alert("Seleziona una risposta!");

        const q = sessione[indice];
        let esatto = false;

        if (Array.isArray(q.corretta)) {
            esatto = selezionati.length === q.corretta.length && selezionati.every(v => q.corretta.includes(v));
        } else {
            esatto = selezionati[0] === q.corretta;
        }

        if (esatto) corretteCount++;
        logRisposte.push({ q, selezionati, esatto });

        if (modalita === 'esercizio' || modalita === 'sequenziale' || modalita === 'blocco') {
            mostraFeedback(q, selezionati);
        } else {
            prossima();
        }
    }

    function mostraFeedback(q, selezionati) {
        feedbackAttivo = true;
        const btn = document.getElementById('action-btn');
        btn.innerText = "Continua";
        
        const explainBox = document.getElementById('explanation');
        explainBox.classList.remove('hidden');
        const testoSpiegazione = q.spiegazione || "Nessuna spiegazione dettagliata disponibile.";
        explainBox.innerHTML = `<strong style="color: var(--aws-orange);">Spiegazione:</strong><p style="font-size: 0.9em; margin-top: 10px;">${testoSpiegazione}</p>`;

        q.opzioni.forEach((_, i) => {
            const label = document.getElementById(`opt-${i}`);
            const isGiusta = Array.isArray(q.corretta) ? q.corretta.includes(i) : q.corretta === i;
            
            if (isGiusta) {
                label.classList.add('correct-opt');
                label.innerHTML += " ✅";
            } else if (selezionati.includes(i)) {
                label.classList.add('wrong-opt');
                label.innerHTML += " ❌";
            }
            label.querySelector('input').disabled = true;
        });
    }

    function prossima() {
    indice++;
    if (indice < sessione.length) {
        mostraDomanda();
    } else {
        // Invece dell'alert, mostriamo il riepilogo
        mostraRiepilogo();
    }
}

function mostraRiepilogo() {
    // Nascondi il quiz e mostra i risultati
    document.getElementById('quiz-screen').classList.add('hidden');
    document.getElementById('result-screen').classList.remove('hidden');

    const summary = document.getElementById('score-summary');
    const percent = Math.round((corretteCount / sessione.length) * 100);
    summary.innerHTML = `Punteggio: <strong>${corretteCount} / ${sessione.length}</strong> (${percent}%)`;

    const list = document.getElementById('results-list');
    list.innerHTML = '';

    logRisposte.forEach((item, i) => {
        const div = document.createElement('div');
        div.className = `result-item ${item.esatto ? 'correct' : 'wrong'}`;

        // Determina il testo delle risposte date
        const tueRisposte = item.selezionati.map(idx => item.q.opzioni[idx]).join(", ");
        
        // Determina il testo delle risposte corrette
        const indiciCorretti = Array.isArray(item.q.corretta) ? item.q.corretta : [item.q.corretta];
        const risposteCorrette = indiciCorretti.map(idx => item.q.opzioni[idx]).join(", ");

        div.innerHTML = `
            <span class="res-text">${i + 1}. ${item.q.testo}</span>
            <div class="res-ans"><strong>Tua risposta:</strong> <span style="color:${item.esatto ? '#2ecc71' : '#e74c3c'}">${tueRisposte} ${item.esatto ? '✅' : '❌'}</span></div>
            ${!item.esatto ? `<div class="res-ans"><strong>Corretta:</strong> <span style="color:#2ecc71">${risposteCorrette}</span></div>` : ''}
            <div class="res-expl"><strong>Spiegazione:</strong> ${item.q.spiegazione || 'Consultare documentazione AWS.'}</div>
        `;
        list.appendChild(div);
    });

    // Se eravamo in modalità sequenziale, resettiamo il salvataggio perché finito
    if (modalita === 'sequenziale') {
        localStorage.removeItem('aws_quiz_last_index');
    }
}

    function saltaADomanda() {
        const val = parseInt(document.getElementById('jump-input').value);
        if (isNaN(val) || val < 1 || val > sessione.length) {
            alert("Numero non valido");
            return;
        }
        indice = val - 1;
        mostraDomanda();
    }
    function shuffleOptions(domanda) {
    // Creiamo un array di oggetti per tenere traccia dell'indice originale
    let opzioniConIndice = domanda.opzioni.map((opz, i) => ({ testo: opz, originale: i }));
    
    // Mescoliamo l'array
    for (let i = opzioniConIndice.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [opzioniConIndice[i], opzioniConIndice[j]] = [opzioniConIndice[j], opzioniConIndice[i]];
    }

    // Aggiorniamo la domanda con le nuove opzioni e ricalcoliamo l'indice della corretta
    const nuoveOpzioni = opzioniConIndice.map(o => o.testo);
    const nuovoIndiceCorretto = opzioniConIndice.findIndex(o => o.originale === domanda.corretta);

    return { ...domanda, opzioni: nuoveOpzioni, corretta: nuovoIndiceCorretto };
}
</script>
</body>
</html>
